trigger:
- main

pool:
  vmImage: windows-latest

variables:
  azureSubscription: 'sportsonAPI'
  webAppName: 'SportsonFrontend'
  projectPath: 'sportson-view/Frontend'
  artifactName: 'frontend-build'

steps:
- task: UseNode@1
  inputs:
    versionSpec: '24.x'
  displayName: 'Install Node.js'

- script: |
    cd $(projectPath)
    npm install
  displayName: 'Install dependencies'

- script: |
    cd $(projectPath)
    npm run build
  displayName: 'Build frontend'

- script: |
    cd $(projectPath)
    echo ===== FRONTEND CONTENTS =====
    dir
    echo ===== DIST CONTENTS =====
    dir dist
  displayName: 'Inspect build output'

- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(projectPath)/dist'
    includeRootFolder: false
    archiveType: zip
    archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
    replaceExistingArchive: true
  displayName: 'Archive build output'

- task: AzureWebApp@1
  inputs:
    azureSubscription: '$(azureSubscription)'
    appType: 'webApp'
    appName: '$(webAppName)'
    package: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
  displayName: 'Deploy to Azure Web App'