trigger: none

pool:
  vmImage: 'ubuntu-latest'

stages:

  - stage: FrontendTests
    displayName: 'Frontend Unit Tests'
    jobs:
      - job: VitestTests
        displayName: 'Run Vitest'
        steps:
          - task: UseNode@1
            inputs:
              version: '22.x'
            displayName: 'Use Node 22'

          - script: npm install
            workingDirectory: sportson-view/Frontend
            displayName: 'Install dependencies'

          - script: npx vitest run --reporter=junit --outputFile=test-results.xml
            workingDirectory: sportson-view/Frontend
            displayName: 'Run Vitest tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'sportson-view/Frontend/test-results.xml'
              testRunTitle: 'Frontend Vitest Results'

  - stage: BackendTests
    displayName: 'Backend Unit Tests'
    jobs:
      - job: DotNetTests
        displayName: 'Run xUnit'
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '10.x'
            displayName: 'Use .NET 10'

          - script: dotnet restore
            workingDirectory: sportson-view/SportsonView.API/SportsonView.API.Tests
            displayName: 'Restore packages'

          - script: dotnet test --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
            workingDirectory: sportson-view/SportsonView.API/SportsonView.API.Tests
            displayName: 'Run xUnit tests'

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: 'sportson-view/SportsonView.API/SportsonView.API.Tests/TestResults/*.trx'
              testRunTitle: 'Backend xUnit Results'